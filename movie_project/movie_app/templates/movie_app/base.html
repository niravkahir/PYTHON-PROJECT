<!DOCTYPE html>
<html>
<head>
    <title>{% block title %}RecommendoX{% endblock %}</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        body { background:#f5f5f5; }
        a { text-decoration:none; }
    </style>
</head>
<body>

<nav class="navbar navbar-dark bg-dark mb-4">
    <div class="container">
        <a class="navbar-brand" href="/">🎬 RecommendoX</a>

        <div>
            {% if user.is_authenticated %}

                {% if user.is_staff %}
                    <a href="{% url 'movie_app:admin_home' %}" class="btn btn-warning btn-sm">Admin Home</a>
                    <a href="{% url 'movie_app:admin_dashboard' %}" class="btn btn-info btn-sm">Dashboard</a>
                {% else %}
                    <a href="{% url 'movie_app:user_home' %}" class="btn btn-primary btn-sm">Home</a>
                    <a href="{% url 'movie_app:watchlist' %}" class="btn btn-secondary btn-sm">Watchlist</a>
                {% endif %}

                <a href="{% url 'movie_app:profile' user.id %}" class="btn btn-light btn-sm">
                    {{ user.username }}
                </a>

                <a href="{% url 'movie_app:logout' %}" class="btn btn-danger btn-sm">Logout</a>

            {% else %}
                <a href="{% url 'movie_app:login' %}" class="btn btn-success btn-sm">Login</a>
                <a href="{% url 'movie_app:register' %}" class="btn btn-primary btn-sm">Register</a>
            {% endif %}
        </div>
    </div>
</nav>

<div class="container">
    {% block content %}{% endblock %}
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
