<!DOCTYPE html>
<html>
<head>
    <title>Movie Recommendation</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>

<nav class="navbar navbar-dark bg-dark mb-4">
    <div class="container">
        <a class="navbar-brand" href="/">🎬 Movie Recommendation</a>

        {% if user.is_staff %}
            <a href="{% url 'movie_app:add_movie' %}" class="btn btn-success">+ Add Movie</a>
        {% endif %}
    </div>
</nav>

<div class="row justify-content-center">
    <div class="col-md-8 col-lg-6">
        <form method="get" class="mb-4">
            <div class="input-group">
                <input type="text"
                       name="search"
                       class="form-control"
                       placeholder="Search movie..."
                       value="{{ request.GET.search }}">

                <select name="sort" class="form-select" style="max-width:130px;">
                    <option value="">Sort</option>
                    <option value="name" {% if request.GET.sort == "name" %}selected{% endif %}>Name</option>
                    <option value="rating" {% if request.GET.sort == "rating" %}selected{% endif %}>Rating</option>
                </select>

                <button class="btn btn-primary">Go</button>
            </div>
        </form>
    </div>
</div>



<div class="container">
    <div class="row">

        {% for m in movies %}
        <div class="col-md-3 mb-4">
            <div class="card">

                {% if m.poster_url %}
                    <img src="{{ m.poster_url }}" class="card-img-top">
                {% else %}
                    <img src="https://via.placeholder.com/300x400">
                {% endif %}

                <div class="card-body">
                    <h5>{{ m.title }}</h5>
                    <p>{{ m.genre }}</p>
                    ⭐ {{ m.rating }}
                </div>

                {% if user.is_staff %}
                <div class="card-footer text-center">
                    <a href="{% url 'movie_app:delete_movie' m.id %}"
                       class="btn btn-danger btn-sm"
                       onclick="return confirm('Delete this movie?')">
                       Delete
                    </a>
                </div>
                {% endif %}
            </div>
        </div>
        {% empty %}
            <p>No movies found</p>
        {% endfor %}

    </div>
</div>

</body>
</html>
