<!DOCTYPE html>
<html>
<head>
    <title>Add Movie</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>

<div class="container mt-5">
    <h3>Add Movie</h3>

    <form method="post">
        {% csrf_token %}

        <input class="form-control mb-2" name="title" placeholder="Title" required>
        <input class="form-control mb-2" name="genre" placeholder="Genre" required>
        <input class="form-control mb-2" name="rating" placeholder="Rating" required>
        <input class="form-control mb-2" name="poster_url" placeholder="Poster URL">

        <button class="btn btn-primary">Save</button>
        <a href="/" class="btn btn-secondary">Back</a>
    </form>
</div>

</body>
</html>
