<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Movie Recommendation</title>

    <!-- BOOTSTRAP 5 CDN -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        body {
            background-color: #f5f5f5;
        }
        .movie-card {
            transition: 0.3s;
        }
        .movie-card:hover {
            transform: scale(1.05);
            box-shadow: 0 4px 15px rgba(0,0,0,0.2);
        }
        .search-box {
            max-width: 600px;
            margin: auto;
        }
    </style>
</head>
<body>

    <!-- NAVBAR -->
    <nav class="navbar navbar-dark bg-dark mb-4">
        <div class="container">
            <a class="navbar-brand" href="/">🎬 Movie Recommendation</a>
        </div>
    </nav>

    <div class="container">

        <!-- Search Bar -->
        <form method="GET" action="/" class="search-box mb-4">
            <div class="input-group">
                <input 
                    type="text" 
                    name="q" 
                    class="form-control" 
                    placeholder="Search movies or web series..."
                    value="{{ request.GET.q }}"
                >
                <button class="btn btn-primary" type="submit">Search</button>
            </div>
        </form>


        <!-- Movie List -->
        <h3 class="mb-3">Movie List</h3>
        <div class="row">

            {% for m in movies %}
            <div class="col-md-3 mb-4">
                <div class="card movie-card">
                    <img src="{{ m.poster_url }}" class="card-img-top" alt="Movie Poster">

                    <div class="card-body">
                        <h5 class="card-title">{{ m.title }}</h5>
                        <p class="text-muted">{{ m.genre }}</p>
                        <p class="small">{{ m.description|truncatechars:80 }}</p>
                    </div>

                    <div class="card-footer text-center">
                        ⭐ Rating: {{ m.rating }}
                    </div>
                </div>
            </div>
            {% empty %}
                <p class="text-center text-danger">No movies found...</p>
            {% endfor %}

        </div>

    </div>


    <!-- BOOTSTRAP JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
