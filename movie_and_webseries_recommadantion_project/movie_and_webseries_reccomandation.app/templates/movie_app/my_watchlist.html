{% extends "base.html" %}
{% block content %}
<h1>My Watchlist</h1>
<ul>
  {% for movie in movies %}
    <li style="margin-bottom:10px;">
      <a href="{% url 'movie_and_webseries_reccomandation.app:movie_detail' movie.pk %}">{{ movie.title }}</a>
      &nbsp; - &nbsp; Rating: {{ movie.rating|default:"N/A" }}
      <form method="post" action="{% url 'movie_and_webseries_reccomandation.app:watchlist_toggle' movie.pk %}" style="display:inline;">
        {% csrf_token %}
        <button type="submit">Remove</button>
      </form>
    </li>
  {% empty %}
    <li>No movies in your watchlist yet.</li>
  {% endfor %}
</ul>
{% endblock %}
