<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Movie Recommendation</title>

    <!-- BOOTSTRAP 5 CDN -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        body {
            background-color: #f5f5f5;
        }
        .movie-card {
            transition: 0.3s;
        }
        .movie-card:hover {
            transform: scale(1.05);
            box-shadow: 0 4px 15px rgba(0,0,0,0.2);
        }
        .search-box {
            max-width: 700px;
            margin: auto;
        }
        .movie-link {
            text-decoration: none;
            color: inherit;
        }
    </style>
</head>
<body>

    <!-- NAVBAR -->
    <nav class="navbar navbar-dark bg-dark mb-4">
        <div class="container">
            <a class="navbar-brand" href="/">🎬 Movie Recommendation</a>

            <a href="{% url 'movie_and_webseries_reccomandation.app:add_movie' %}" class="btn btn-success">+ Add Movie</a>

        </div>
    </nav>

    <div class="container">

        <!-- Search & Sort -->
        <form method="GET" action="/" class="search-box mb-4">
            <div class="input-group">

                <!-- Search Bar -->
                <input 
                    type="text" 
                    name="search" 
                    class="form-control" 
                    placeholder="Search movie or web series..."
                    value="{{ request.GET.search }}"
                >

                <!-- Sort Menu -->
                <select name="sort" class="form-select" style="max-width:150px;">
                    <option value="">Sort By</option>
                    <option value="name" {% if request.GET.sort == 'name' %}selected{% endif %}>Name</option>
                    <option value="rating" {% if request.GET.sort == 'rating' %}selected{% endif %}>Rating</option>
                </select>

                <button class="btn btn-primary" type="submit">Search</button>
            </div>
        </form>

        <!-- Movie List -->
        <h3 class="mb-3">Movie List</h3>
        <div class="row">

            {% for m in movies %}
            <div class="col-md-3 mb-4">
                <div class="card movie-card">

                    <!-- ⭐ CLICKABLE DETAIL PAGE LINK (ONLY CHANGE) -->
                    <a href="{% url 'movie_and_webseries_reccomandation.app:movie_detail' m.id %}" class="movie-link">

                        {% if m.poster_url %}
                            <img src="{{ m.poster_url }}" class="card-img-top" alt="{{ m.title }}">
                        {% else %}
                            <img src="https://via.placeholder.com/300x400?text=No+Image" class="card-img-top">
                        {% endif %}

                        <div class="card-body">
                            <h5 class="card-title">{{ m.title }}</h5>
                            <p class="text-muted">{{ m.genre }}</p>
                            <p class="small">{{ m.description|default:"No description available" | truncatechars:80 }}</p>
                        </div>

                    </a>
                    <!-- END LINK -->

                    <div class="card-footer text-center">
                        ⭐ Rating: {{ m.rating }}

                        <br>
                        <a href="/delete/{{ m.id }}/" class="btn btn-sm btn-danger mt-2">Delete</a>
                    </div>

                </div>
            </div>
            {% empty %}
                <p class="text-center text-danger">No movies found...</p>
            {% endfor %}

        </div>

    </div>

    <!-- BOOTSTRAP JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
